<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Insurance Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <h1>Vehicle Insurance Prediction Form</h1>

        <form method="post" action="/">

            <label>Gender</label>
            <select name="Gender" required>
                <option value="">Select Gender</option>
                <option value="1">Male</option>
                <option value="0">Female</option>
            </select>

            <label>Age</label>
            <input type="number" name="Age" placeholder="Enter Age" required>

            <label>Driving License</label>
            <select name="Driving_License" required>
                <option value="">Has Driving License?</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <label>Region Code</label>
            <input type="number" step="0.1" name="Region_Code" placeholder="Enter Region Code" required>

            <label>Previously Insured</label>
            <select name="Previously_Insured" required>
                <option value="">Previously Insured?</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <label>Annual Premium</label>
            <input type="number" step="0.1" name="Annual_Premium" placeholder="Enter Annual Premium" required>

            <label>Policy Sales Channel</label>
            <input type="number" step="0.1" name="Policy_Sales_Channel" placeholder="Enter Policy Sales Channel" required>

            <label>Vintage</label>
            <input type="number" name="Vintage" placeholder="Enter Vintage" required>

            <label>Vehicle Age &lt; 1 Year</label>
            <select name="Vehicle_Age_lt_1_Year" required>
                <option value="">Select Option</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <label>Vehicle Age &gt; 2 Years</label>
            <select name="Vehicle_Age_gt_2_Years" required>
                <option value="">Select Option</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <label>Vehicle Damage</label>
            <select name="Vehicle_Damage_Yes" required>
                <option value="">Vehicle Damaged?</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <button type="submit">Predict</button>
        </form>

        <a href="/train">
            <button class="train-button">Train Model</button>
        </a>

        {% if context != "Rendering" %}
        <div class="result">
            <h2>{{ context }}</h2>
        </div>
        {% endif %}
    </div>
</body>
</html>
